name: ci

on:
  workflow_call:
  push:
    paths-ignore:
      - '.devcontainer/**'
      - '.github/workflows/**'
  pull_request:
    branches: ["master"]
    paths-ignore:
      - '.devcontainer/**'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...

  gate:
    name: gate
    needs: [test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          results=($(echo '${{ toJSON(needs.*.result) }}' | jq -r '.[]'))
          for r in "${results[@]}"; do
            if [[ "$r" != "success" ]]; then echo "A required job did not succeed: $r"; exit 1; fi
          done
          echo "All required jobs passed"